name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: PR Title Check
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
          revert
        requireScope: false

    - name: Check for merge conflicts
      run: |
        git fetch origin main
        git merge-tree $(git merge-base HEAD origin/main) HEAD origin/main | grep -q "<<<<<< " && exit 1 || echo "No merge conflicts detected"

    - name: Lint commit messages
      uses: wagoid/commitlint-github-action@v5
      with:
        configFile: '.commitlintrc.json'
        failOnWarnings: false

  size-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check changed files
      run: |
        files_changed=$(git diff --name-only HEAD~1 HEAD | wc -l)
        echo "Files changed: $files_changed"
        if [ $files_changed -gt 50 ]; then
          echo "::warning::Large PR detected ($files_changed files changed). Consider breaking this into smaller PRs."
        fi